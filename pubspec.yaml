name: crucue
description: "Crucue — a private caregiver support app for families."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI / Layout
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.4
  animate_do: ^4.2.0
  # flutter_markdown replaced with actively maintained fork (original discontinued)
  flutter_markdown_plus: ^1.0.7

  # Navigation
  go_router: ^14.8.1

  # State Management
  flutter_riverpod: ^2.5.1

  # Firebase — FlutterFire BoM 4.12.0 (see firebase/flutterfire VERSIONS.md)
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  cloud_functions: ^6.2.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0
  firebase_analytics: ^12.3.0
  firebase_crashlytics: ^5.2.0
  flutter_local_notifications: ^17.2.2

  # Auth providers
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.3

  # Audio — recording, playback, TTS
  record: ^6.2.0
  flutter_tts: ^4.2.0
  just_audio: ^0.9.40
  permission_handler: ^11.3.1

  # Utilities
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  intl: ^0.19.0
  shared_preferences: ^2.5.5
  firebase_app_check: ^0.4.3
  flutter_gemma: ^0.12.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
    - assets/svg/
    - assets/Logos/
    - assets/demo/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/roboto.ttf
    - family: Montserrat
      fonts:
        - asset: assets/fonts/montserrat.ttf
